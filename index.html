<!DOCTYPE html>
<html>
<head>
  <title>My Startup MVP</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { font-family: system-ui; padding: 40px; max-width: 600px; margin: 0 auto; text-align: center; }
    button { padding: 12px 24px; font-size: 16px; margin: 10px; cursor: pointer; }
  </style>
</head>
<body>
  <h1>Hello from Vercel + Supabase!</h1>
  <p>Your app is now connected.</p>
  <button id="login">Sign in with Google</button>
  <button id="logout">Sign Out</button>
  <div id="status">Status: Checking login...</div>

  <script>
    const supabaseUrl = 'https://emwxfuklvggqctkseznia.supabase.co'; 
    const supabaseAnonKey = 'sb_publishable_j75j2rLJqCdBFceuzJWU9w_9Q1aTNJz'; 

    // Using lowercase 'supabase' to pull the tool, and 'supabaseClient' to prevent collisions
    const supabaseClient = supabase.createClient(supabaseUrl, supabaseAnonKey);

    document.getElementById('login').addEventListener('click', async () => {
      const { error } = await supabaseClient.auth.signInWithOAuth({
        provider: 'google',
        options: { redirectTo: window.location.href }
      });
      if (error) document.getElementById('status').innerHTML = 'Error: ' + error.message;
    });

    document.getElementById('logout').addEventListener('click', async () => {
      await supabaseClient.auth.signOut();
    });

    supabaseClient.auth.getUser().then(({ data: { user } }) => {
      document.getElementById('status').innerHTML = user ? `Logged in as: ${user.email}` : 'Status: Not logged in';
    });
  </script>
</body>
</html>
