<!DOCTYPE html>
<html>
<head>
  <title>My Startup MVP</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { font-family: system-ui; padding: 40px; }
    button { padding: 12px 24px; font-size: 16px; margin: 10px; }
  </style>
</head>
<body>
  <h1>Hello from Vercel + Supabase!</h1>
  <p>Your app is now connected.</p>
  
  <button id="login">Sign in with Google</button>
  <button id="logout">Sign Out</button>
  
  <div id="status">Status: Not logged in</div>

  <script>
    const supabase = Supabase.createClient(
      process.env.NEXT_PUBLIC_SUPABASE_URL || 'https://YOUR-URL.supabase.co',
      process.env.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'YOUR-ANON-KEY'
    );

    // Login
    document.getElementById('login').addEventListener('click', async () => {
      const { error } = await supabase.auth.signInWithOAuth({ provider: 'google' });
      if (error) document.getElementById('status').innerHTML = 'Error: ' + error.message;
    });

    // Logout
    document.getElementById('logout').addEventListener('click', async () => {
      await supabase.auth.signOut();
      document.getElementById('status').innerHTML = 'Signed out';
    });

    // Check current user
    supabase.auth.getUser().then(({ data }) => {
      const user = data.user;
      document.getElementById('status').innerHTML = user 
        ? `Logged in as: ${user.email}` 
        : 'Status: Not logged in';
    });
  </script>
</body>
</html>
